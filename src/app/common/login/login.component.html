<div class="min-h-screen bg-slate-950 text-slate-100 theme-bg theme-text">
  <div class="mx-auto flex min-h-screen max-w-5xl items-center justify-center px-6 py-12 sm:px-8 lg:px-12">
    <div class="w-full rounded-[2rem] border border-white/10 bg-slate-900/90 p-8 shadow-xl shadow-slate-950/30 backdrop-blur-lg sm:p-12 theme-card theme-border">
      <div class="mb-10 flex flex-col gap-3 text-center">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-cyan-400">Office Management</p>
        <h1 class="text-4xl font-semibold theme-text sm:text-5xl">Welcome back, administrator</h1>
        <p class="mx-auto max-w-2xl theme-muted">Sign in to manage team schedules, meeting rooms, inventory, and office workflows.</p>
      </div>

      <div class="space-y-6">
        <form [formGroup]="loginForm" (submit)="onSubmit()" class="space-y-6">
          <div *ngIf="errorMessage" class="rounded-3xl border border-red-500/30 bg-red-500/10 p-4 text-sm text-red-200">
            {{ errorMessage }}
          </div>

          <label class="block text-sm font-medium theme-text">
            <span>Email address</span>
            <input
              formControlName="email"
              type="email"
              placeholder="admin@officehub.com"
              class="mt-3 w-full rounded-3xl border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20 theme-input"
              [class.border-red-500]="email?.invalid && email?.touched"
            />
            <p *ngIf="email?.hasError('email') && email?.touched" class="mt-1 text-xs text-red-400">
              Please enter a valid email address.
            </p>
          </label>

          <label class="block text-sm font-medium theme-text">
            <span>Password</span>
            <input
              formControlName="password"
              type="password"
              placeholder="••••••••"
              class="mt-3 w-full rounded-3xl border border-slate-800 bg-slate-950 px-4 py-3 text-slate-100 outline-none transition duration-200 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20 theme-input"
              [class.border-red-500]="password?.invalid && password?.touched"
            />
            <p *ngIf="password?.hasError('minlength') && password?.touched" class="mt-1 text-xs text-red-400">
              Password must be at least 6 characters.
            </p>
          </label>

          <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <label class="inline-flex items-center gap-3 text-sm text-slate-300">
              <input type="checkbox" class="h-4 w-4 rounded border-slate-700 bg-slate-800 text-cyan-500 focus:ring-cyan-500/60" />
              Remember me
            </label>
            <a href="#" class="text-sm font-medium text-cyan-400 transition hover:text-cyan-200">Forgot password?</a>
          </div>

          <button
            type="submit"
            [disabled]="isLoading || loginForm.invalid"
            class="inline-flex w-full items-center justify-center rounded-3xl bg-cyan-500 px-6 py-3 text-base font-semibold text-slate-950 transition duration-200 hover:bg-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-500/30 disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span *ngIf="!isLoading">Sign in</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="h-5 w-5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Signing in...
            </span>
          </button>
        </form>

        <div class="rounded-3xl border border-white/5 bg-slate-950/80 p-5 text-slate-300 theme-card theme-border">
          <p class="text-sm font-medium theme-text">Quick access</p>
          <ul class="mt-4 space-y-3 text-sm theme-muted">
            <li>• Office attendance tracking</li>
            <li>• Asset and inventory requests</li>
            <li>• Conference room booking dashboard</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
