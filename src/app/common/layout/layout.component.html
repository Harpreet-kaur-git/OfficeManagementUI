<div [ngStyle]="{'--sidebar-width': isCollapsed ? '80px' : '300px'}" class="min-h-screen bg-slate-950 text-slate-100 theme-bg theme-text">
  <div class="mx-auto max-w-[1600px] px-4 py-6 sm:px-6 lg:px-8">
    <div class="relative lg:grid lg:grid-cols-[var(--sidebar-width)_minmax(0,1fr)] lg:gap-6">
      <aside
        class="fixed inset-y-0 left-0 z-50 w-full lg:w-[var(--sidebar-width)] lg:max-w-none transform overflow-y-auto rounded-[2rem] border theme-border theme-card p-4 shadow-2xl shadow-slate-950/20 transition-all duration-300 ease-in-out lg:static lg:inset-auto lg:translate-x-0 lg:p-6"
        [class.-translate-x-full]="!isMobileSidebarOpen"
        [class.translate-x-0]="isMobileSidebarOpen"
      >
        <app-sidebar [collapsed]="isCollapsed" (collapsedChange)="isCollapsed = $event"></app-sidebar>
      </aside>

      <div class="min-h-screen overflow-hidden rounded-[2rem] border border-white/10 bg-slate-900/80 shadow-xl shadow-slate-950/30 backdrop-blur-lg theme-card theme-border lg:ml-0">
        <app-header (openSidebar)="toggleMobileSidebar()"></app-header>
        <main class="flex-1 overflow-auto p-6 sm:p-8">
          <router-outlet></router-outlet>
        </main>
      </div>

      <div *ngIf="isMobileSidebarOpen" class="fixed inset-0 z-40 bg-slate-950/50 lg:hidden" (click)="closeMobileSidebar()"></div>
    </div>
  </div>
</div>
