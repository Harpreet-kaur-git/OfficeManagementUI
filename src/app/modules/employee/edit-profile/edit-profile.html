<div class="p-6 lg:p-8 bg-slate-50 dark:bg-slate-900 min-h-screen transition-colors duration-300">
  <div class="max-w-3xl mx-auto">
    <header class="mb-8">
      <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Edit Profile</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm">Update your information to keep your profile current.</p>
    </header>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-6">
      <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Full Name</label>
            <input formControlName="name" type="text" 
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Email Address</label>
            <input formControlName="email" type="email" 
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Phone Number</label>
            <input formControlName="phone" type="text" 
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
          </div>
          <div class="md:col-span-2 space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Residential Address</label>
            <textarea formControlName="address" rows="3" 
                      class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
          </div>
        </div>

        <div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-700">
          <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-6">Emergency Contact</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Contact Name</label>
              <input formControlName="emergencyContactName" type="text" 
                     class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Relation</label>
              <input formControlName="emergencyContactRelation" type="text" 
                     class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <div class="space-y-2 md:col-span-2">
              <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Emergency Phone</label>
              <input formControlName="emergencyContactPhone" type="text" 
                     class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-4">
        <button type="button" (click)="cancel()" 
                class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
          Cancel
        </button>
        <button type="submit" [disabled]="profileForm.invalid" 
                class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-200 dark:shadow-none disabled:opacity-50 disabled:cursor-not-allowed">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
