<div class="p-6 lg:p-8 bg-slate-50 dark:bg-slate-900 min-h-screen transition-colors duration-300">
  <div class="max-w-4xl mx-auto">
    <header class="mb-8">
      <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Onboard New Employee</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm">Register a new team member into the management system.</p>
    </header>

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
          
          <!-- Personal Information -->
          <div class="md:col-span-2 border-b border-slate-100 dark:border-slate-700 pb-2 mb-2">
            <h3 class="text-sm font-bold uppercase tracking-widest text-blue-600 dark:text-blue-400">Personal Details</h3>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Full Name</label>
            <input formControlName="fullName" type="text" placeholder="e.g. John Smith"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600">
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Email Address</label>
            <input formControlName="email" type="email" placeholder="john.smith@company.com"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600">
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Phone Number</label>
            <input formControlName="phone" type="tel" placeholder="10-digit mobile"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600">
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Employee ID</label>
            <input formControlName="employeeId" type="text" placeholder="e.g. EMP-2024-001"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600">
          </div>

          <!-- Professional Information -->
          <div class="md:col-span-2 border-b border-slate-100 dark:border-slate-700 pb-2 mt-4 mb-2">
            <h3 class="text-sm font-bold uppercase tracking-widest text-blue-600 dark:text-blue-400">Employment Details</h3>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Department</label>
            <select formControlName="department" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none">
              <option value="" disabled>Select Department</option>
              <option *ngFor="let dept of departments" [value]="dept">{{dept}}</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Job Designation</label>
            <select formControlName="role" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none">
              <option value="" disabled>Select Role</option>
              <option *ngFor="let role of roles" [value]="role">{{role}}</option>
            </select>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Joining Date</label>
            <input formControlName="joinDate" type="date"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">Annual Salary ($)</label>
            <input formControlName="salary" type="number" placeholder="Annual base pay"
                   class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600">
          </div>
        </div>
      </div>

      <div class="flex justify-end items-center gap-4">
        <a routerLink="/dashboard/hr-dashboard" 
           class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
          Cancel
        </a>
        <button type="submit" [disabled]="employeeForm.invalid || isSubmitting" 
                class="flex items-center gap-3 px-10 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl transition-all shadow-lg shadow-blue-200 dark:shadow-none disabled:opacity-50 disabled:grayscale disabled:cursor-not-allowed">
          <svg *ngIf="isSubmitting" class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isSubmitting ? 'Onboarding...' : 'Confirm Registration' }}
        </button>
      </div>
    </form>
  </div>
</div>
